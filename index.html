<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بلدية هيت - الموقع الرسمي</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Cairo', sans-serif; background:#f8fafc; }
.hidden { display:none; }
</style>
</head>
<body class="text-gray-800">

<!-- LOGIN MODAL -->
<div id="loginModal" class="fixed inset-0 bg-black/60 flex items-center justify-center z-50">
<div class="bg-white w-full max-w-md p-8 rounded-2xl shadow-2xl">

<h2 class="text-2xl font-bold text-center mb-6">تسجيل الدخول</h2>

<div class="flex border-b mb-6">
<button onclick="showEmployee()" id="tabEmployee" class="flex-1 py-2 font-bold border-b-2 border-green-600 text-green-600">موظف</button>
<button onclick="showCitizen()" id="tabCitizen" class="flex-1 py-2 font-bold text-gray-500">مواطن</button>
</div>

<!-- Employee -->
<div id="employeeBox">
<input type="password" id="employeeCode" placeholder="ادخل كود الموظف"
class="w-full border p-3 rounded-lg mb-4">
<button onclick="loginEmployee()" 
class="w-full bg-green-600 text-white py-3 rounded-lg font-bold">
دخول
</button>
</div>

<!-- Citizen -->
<div id="citizenBox" class="hidden">
<input type="email" id="citizenEmail" placeholder="البريد الإلكتروني"
class="w-full border p-3 rounded-lg mb-3">
<input type="password" id="citizenPass" placeholder="كلمة المرور"
class="w-full border p-3 rounded-lg mb-3">
<button onclick="registerCitizen()" 
class="w-full bg-gray-600 text-white py-2 rounded-lg mb-2">
تسجيل حساب جديد
</button>
<button onclick="loginCitizen()" 
class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">
دخول
</button>
</div>

</div>
</div>

<!-- NAVBAR -->
<nav class="bg-white shadow p-4 flex justify-between items-center">
<span class="font-bold text-xl text-green-600">بلدية هيت</span>
<div>
<span id="userRole" class="ml-4 text-sm text-gray-600"></span>
<button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded-lg">
تسجيل خروج
</button>
</div>
</nav>

<!-- CONTENT -->
<section class="p-10 text-center">
<h1 class="text-4xl font-bold mb-4">مرحباً بكم في بلدية هيت</h1>
<p class="text-gray-600">منصتكم الرقمية لخدمة المواطنين</p>
</section>

<script>

// ===================
// TAB SWITCH
// ===================
function showEmployee(){
document.getElementById("employeeBox").classList.remove("hidden");
document.getElementById("citizenBox").classList.add("hidden");
}

function showCitizen(){
document.getElementById("citizenBox").classList.remove("hidden");
document.getElementById("employeeBox").classList.add("hidden");
}

// ===================
// EMPLOYEE LOGIN
// ===================
function loginEmployee(){
let code = document.getElementById("employeeCode").value;
if(code === "hit03"){
localStorage.setItem("userRole","employee");
enterSite("موظف بلدية");
}else{
alert("كود غير صحيح");
}
}

// ===================
// CITIZEN REGISTER
// ===================
function registerCitizen(){
let email = document.getElementById("citizenEmail").value;
let pass = document.getElementById("citizenPass").value;

if(email && pass){
localStorage.setItem("citizen_"+email,pass);
alert("تم إنشاء الحساب بنجاح");
}else{
alert("املأ الحقول");
}
}

// ===================
// CITIZEN LOGIN
// ===================
function loginCitizen(){
let email = document.getElementById("citizenEmail").value;
let pass = document.getElementById("citizenPass").value;

let savedPass = localStorage.getItem("citizen_"+email);

if(savedPass === pass){
localStorage.setItem("userRole","citizen");
localStorage.setItem("userEmail",email);
enterSite("مواطن");
}else{
alert("بيانات غير صحيحة");
}
}

// ===================
// ENTER SITE
// ===================
function enterSite(roleText){
document.getElementById("loginModal").style.display="none";
document.getElementById("userRole").innerText = "مرحباً، " + roleText;
}

// ===================
// LOGOUT
// ===================
function logout(){
localStorage.removeItem("userRole");
location.reload();
}

// ===================
// CHECK SESSION
// ===================
window.onload = function(){
let role = localStorage.getItem("userRole");

if(role){
if(role === "employee"){
enterSite("موظف بلدية");
}
if(role === "citizen"){
enterSite("مواطن");
}
}
}

</script>

</body>
</html>
