<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بلدية هيت - تقديم شكوى</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Cairo', sans-serif; background:#f8fafc; }
</style>
</head>
<body class="p-6">

<h1 class="text-3xl font-bold text-center mb-8 text-green-600">
بلدية هيت - نظام الشكاوى
</h1>

<div class="max-w-xl mx-auto bg-white p-8 rounded-xl shadow">

<form id="complaintForm" class="space-y-4">

<input type="text" id="name" placeholder="الاسم الكامل"
class="w-full border p-3 rounded" required>

<input type="tel" id="phone" placeholder="رقم الهاتف"
class="w-full border p-3 rounded" required>

<select id="type" class="w-full border p-3 rounded">
<option>تراكم نفايات</option>
<option>حفرة في الطريق</option>
<option>عطل إنارة</option>
<option>أخرى</option>
</select>

<textarea id="details" rows="4" placeholder="تفاصيل الشكوى"
class="w-full border p-3 rounded" required></textarea>

<button type="button" onclick="getLocation()"
class="w-full bg-yellow-400 py-3 rounded font-bold">
تحديد موقعي GPS
</button>

<input type="hidden" id="coords">

<button type="submit"
class="w-full bg-green-600 text-white py-3 rounded font-bold">
إرسال الشكوى
</button>

</form>
</div>

<script>
function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
coords.value = pos.coords.latitude + "," + pos.coords.longitude;
alert("تم تحديد الموقع بنجاح");
});
}

document.getElementById("complaintForm").onsubmit=function(e){
e.preventDefault();

let complaints = JSON.parse(localStorage.getItem("complaints")) || [];

let newComplaint = {
id: Date.now(),
name: name.value,
phone: phone.value,
type: type.value,
details: details.value,
coords: coords.value,
status: "قيد المعالجة",
date: new Date().toLocaleString()
};

complaints.push(newComplaint);
localStorage.setItem("complaints",JSON.stringify(complaints));

alert("تم إرسال الشكوى بنجاح");
this.reset();
}
</script>

</body>
</html>
