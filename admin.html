<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم الموظف</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Cairo', sans-serif; background:#f8fafc; }
</style>
</head>
<body class="p-6">

<h1 class="text-3xl font-bold text-center mb-8 text-red-600">
لوحة تحكم موظفي بلدية هيت
</h1>

<div class="max-w-5xl mx-auto">

<div class="grid grid-cols-3 gap-4 mb-8 text-center">

<div class="bg-white p-6 rounded shadow">
<h2 class="text-xl font-bold" id="totalCount">0</h2>
<p>إجمالي الشكاوى</p>
</div>

<div class="bg-white p-6 rounded shadow">
<h2 class="text-xl font-bold text-yellow-600" id="pendingCount">0</h2>
<p>قيد المعالجة</p>
</div>

<div class="bg-white p-6 rounded shadow">
<h2 class="text-xl font-bold text-green-600" id="doneCount">0</h2>
<p>منجزة</p>
</div>

</div>

<div id="complaintsList"></div>

</div>

<script>

let complaints = JSON.parse(localStorage.getItem("complaints")) || [];

function render(){
complaintsList.innerHTML="";

let pending=0;
let done=0;

complaints.forEach(c=>{

if(c.status==="قيد المعالجة") pending++;
if(c.status==="منجزة") done++;

complaintsList.innerHTML+=`
<div class="bg-white p-6 rounded shadow mb-4">
<h3 class="font-bold">${c.type}</h3>
<p>${c.details}</p>
<p class="text-sm text-gray-500">${c.date}</p>
<p class="text-sm">الحالة: <b>${c.status}</b></p>

<button onclick="markDone(${c.id})"
class="bg-green-500 text-white px-3 py-1 rounded mt-2">
تم الإنجاز
</button>

<button onclick="deleteComplaint(${c.id})"
class="bg-red-500 text-white px-3 py-1 rounded mt-2">
حذف
</button>
</div>
`;
});

totalCount.innerText=complaints.length;
pendingCount.innerText=pending;
doneCount.innerText=done;
}

function markDone(id){
complaints=complaints.map(c=>{
if(c.id===id) c.status="منجزة";
return c;
});
localStorage.setItem("complaints",JSON.stringify(complaints));
render();
}

function deleteComplaint(id){
complaints=complaints.filter(c=>c.id!==id);
localStorage.setItem("complaints",JSON.stringify(complaints));
render();
}

render();

</script>

</body>
</html>
